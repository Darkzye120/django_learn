<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarefas</title>
</head>
<body>
    <h1>Suas tarefas {{nome}}</h1>
    <table border="1">
        <thead>
            <th>Nome</th>
            <th>Descrição</th>
            <th>Situação</th>
            <tbody>
                {%for tarefa in tarefas%}
                    <tr>
                        <td>{{tarefa.nome}}</td>
                        <td>{{tarefa.tarefa}}</td>
                        <td>{% if tarefa.feito %}Completo{%  else %}Incompleto{% endif %}</td>
                        <td><a href="{% url 'tarefas:editar' tarefa.id %}">Editar</a></td>
                        <td><a href="{% url 'tarefas:remover' tarefa.id %}">Remover</a></td>
                    </tr>
                {% endfor %}
            </tbody>
        </thead>
    </table>
    <a href="{%url 'tarefas:adicionar' %}">Adicionar tarefa</a>
</body>
</html>
